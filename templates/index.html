<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Clone</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #fafafa; margin: 0; padding: 20px; text-align: center; }
        .profile-container { background: white; border: 1px solid #dbdbdb; padding: 30px; display: inline-block; border-radius: 10px; margin-top: 50px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .stats { display: flex; gap: 20px; justify-content: center; font-size: 16px; margin: 20px 0; }
        .btn { background-color: #0095f6; color: white; padding: 10px 20px; border-radius: 5px; text-decoration: none; font-weight: bold; display: inline-block; }
    </style>
</head>
<body>
    <div class="profile-container">
        <h2>📸 నా ఇన్‌స్టాగ్రామ్ ప్రొఫైల్</h2>
        <div class="stats">
            <div><b>{{ profile[0] }}</b> posts</div>
            <div><b>{{ profile[1] }}</b> followers</div>
            <div><b>{{ profile[2] }}</b> following</div>
        </div>
        <hr>
        <br>
        <a href="/messenger" class="btn">💬 చాట్ మెసెంజర్ ఓపెన్ చెయ్</a>
    </div>
</body>
</html>
